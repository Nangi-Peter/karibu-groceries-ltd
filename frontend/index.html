<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Karibu Groceries LTD - Login</title>

    <!-- EXTERNAL LIBRARIES - Loading styles and icons -->

    <!-- Bootstrap 5 CSS - Provides responsive grid and components -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Font Awesome - Provides all the icons used throughout the application -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <!-- Google Fonts - Poppins font for modern, clean typography -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- CUSTOM CSS FILES - Our own styles -->

    <!-- Custom CSS - Universal styles shared across all pages -->
    <link rel="stylesheet" href="css/style.css" />
    
    <!-- Login-specific CSS - Styles only for this login page (makes it static/no scroll) -->
    <link rel="stylesheet" href="css/login.css" />
  </head>
  <body>
    <!-- LOGIN PAGE CONTAINER - Main wrapper for the entire login interface -->
    <!-- Login Page Container - Centers the login card on screen with background image -->
    <div class="login-container">
      
      <!-- Login Card - The white card containing all login elements -->
      <div class="login-card">
        
        <!-- LOGIN HEADER - Branding and welcome message -->
        <div class="login-header">
          <!-- Store icon - Visual representation of the business -->
          <i class="fas fa-store fa-3x mb-3"></i>
          <h2>Karibu Groceries LTD</h2>
          <p>Wholesale Produce Distribution System</p>
        </div>

        <!-- LOGIN BODY - Contains the form and security notice -->
        <div class="login-body">
           
          <!-- SECURITY NOTICE - Reassures users about data protection -->
          <!-- Security Notice - Displays encryption and monitoring information -->
          <div class="security-notice">
            <i class="fas fa-shield-alt"></i>
            <strong>Secure Login:</strong> All sessions are encrypted and
            monitored.
          </div>

          <!-- LOGIN FORM - Main authentication form -->
          <!-- Login Form - Handles user authentication -->
          <form id="loginForm">
            
            <!-- USERNAME FIELD - With icon for better UX -->
            <div class="form-group">
              <!-- User icon inside input field -->
              <i class="fas fa-user"></i>
              <input
                type="text"
                class="form-control"
                id="username"
                placeholder="Username"
                required
              />
            </div>

            <!-- PASSWORD FIELD - With lock icon for security indication -->
            <div class="form-group">
              <!-- Lock icon indicates this is a password field -->
              <i class="fas fa-lock"></i>
              <input
                type="password"
                class="form-control"
                id="password"
                placeholder="Password"
                required
              />
            </div>

            <!-- ROLE SELECTION - Implements Role-Based Access Control (RBAC) -->
            <div class="form-group">
              <!-- Role selection dropdown - Determines user permissions -->
              <select class="form-control" id="userRole" required>
                <option value="">Select Role</option>
                <option value="director">Director (Mr. Orban)</option>
                <option value="manager">Branch Manager</option>
                <option value="attendant">Sales Attendant</option>
              </select>
              <!-- User tag icon for role selection -->
              <i class="fas fa-user-tag"></i>
            </div>

            <!-- LOGIN BUTTON - Submits the form -->
            <!-- Login Button - Triggers authentication process -->
            <button type="submit" class="btn-login" id="loginBtn">
              <i class="fas fa-sign-in-alt me-2"></i>Login to Dashboard
            </button>
          </form>

          <!-- DEMO CREDENTIALS - For testing and presentation purposes -->
          <!-- Demo Credentials - Shows sample login info for each role -->
          <div class="demo-credentials">
            <small class="text-muted">Demo Credentials:</small><br />
            <small class="text-muted">Director: admin / admin123</small><br />
            <small class="text-muted">Manager: manager / pass123</small><br />
            <small class="text-muted">Attendant: attendant / pass123</small>
          </div>
        </div>
      </div>
    </div>

    <!-- LOADING SPINNER - Shows when processing requests -->
    <!-- Loading Spinner - Appears during authentication and data loading -->
    <div class="spinner-overlay" id="spinner">
      <div class="spinner"></div>
    </div>

    <!-- JAVASCRIPT FILES - Add interactivity -->
    <!-- Bootstrap JavaScript - Required for Bootstrap components -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Main JavaScript file - Contains all application logic -->
    <script src="js/script.js"></script>
  </body>
</html>
